<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meiro Event Workbench</title>
    <link rel="stylesheet" href="workbench.css">
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <h1>Meiro Event Workbench</h1>
          <p id="pageContext">Inspect SDK setup, data layers, DOM mappings, and event delivery.</p>
        </div>
        <div class="actions">
          <button id="refreshButton" type="button">Refresh</button>
          <button id="enableButton" type="button">Enable tab</button>
          <button id="exportSetupButton" type="button">Export setup</button>
        </div>
      </header>

      <nav class="tabs" aria-label="Workbench sections">
        <button data-tab="readiness" class="active" type="button">Readiness</button>
        <button data-tab="events" type="button">Events</button>
        <button data-tab="sdk" type="button">SDK</button>
        <button data-tab="datalayer" type="button">Data layer</button>
        <button data-tab="mapper" type="button">DOM mapper</button>
        <button data-tab="contracts" type="button">Contracts</button>
      </nav>

      <section id="readiness" class="panel active">
        <div id="readinessList" class="check-grid"></div>
      </section>

      <section id="events" class="panel">
        <div class="panel-header">
          <h2>Event inspector</h2>
          <button id="clearLogsButton" type="button">Clear logs</button>
        </div>
        <div id="eventList" class="event-list"></div>
      </section>

      <section id="sdk" class="panel">
        <div id="sdkDiagnostics" class="grid-two"></div>
      </section>

      <section id="datalayer" class="panel">
        <div class="panel-header">
          <h2>Data layer inspector</h2>
          <button id="saveDataLayersButton" type="button">Save names</button>
        </div>
        <label class="stack">
          <span>Globals to inspect</span>
          <input id="dataLayerNames" type="text" spellcheck="false">
        </label>
        <div id="dataLayerOutput" class="grid-two"></div>
      </section>

      <section id="mapper" class="panel">
        <div class="panel-header">
          <h2>DOM event mapper</h2>
          <button id="pickerButton" type="button">Pick element</button>
        </div>
        <div id="pickerOutput" class="notice"></div>
        <form id="ruleForm" class="rule-form">
          <label><span>Name</span><input id="ruleName" type="text" placeholder="CTA click"></label>
          <label><span>Event type</span><input id="ruleEventType" type="text" value="cta_click"></label>
          <label><span>CSS selector</span><input id="ruleSelector" type="text" spellcheck="false"></label>
          <label><span>Text contains</span><input id="ruleText" type="text"></label>
          <label><span>Href contains</span><input id="ruleHref" type="text"></label>
          <button class="primary" type="submit">Save rule</button>
        </form>
        <div id="rulesList" class="rule-list"></div>
      </section>

      <section id="contracts" class="panel">
        <div class="grid-two">
          <section class="box">
            <div class="panel-header">
              <h2>Payload contracts</h2>
              <button id="saveContractsButton" type="button">Save contracts</button>
            </div>
            <textarea id="contractsEditor" spellcheck="false"></textarea>
          </section>
          <section class="box">
            <div class="panel-header">
              <h2>Profiles</h2>
              <button id="createProfileButton" type="button">Save current</button>
            </div>
            <input id="profileName" type="text" placeholder="Profile name">
            <div id="profilesList" class="profile-list"></div>
          </section>
        </div>
      </section>

      <p id="message" role="status"></p>
    </main>

    <script src="../src/shared/constants.js"></script>
    <script src="../src/shared/browser-utils.js"></script>
    <script src="../src/shared/admin-utils.js"></script>
    <script src="workbench.js"></script>
  </body>
</html>
